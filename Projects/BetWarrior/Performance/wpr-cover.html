<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600&display=swap');

@page { size: 13.33in 7.5in; margin: 0; }

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1280px;
  height: 720px;
  overflow: hidden;
  background: #000;
}

.cover {
  display: flex;
  width: 1280px;
  height: 720px;
}

/* PAINEL ESQUERDO */
.left {
  position: relative;
  width: 490px;
  height: 720px;
  background: #000000;
  display: flex;
  flex-direction: column;
  padding: 52px 52px 52px 72px;
  flex-shrink: 0;
}

.accent-bar {
  position: absolute;
  left: 0; top: 0;
  width: 10px; height: 100%;
  background: #FF3900;
}

.logo-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 0;
}

.logo-icon {
  width: 22px;
  height: auto;
  flex-shrink: 0;
}

.brand-name {
  font-family: 'Archivo Black', sans-serif;
  font-size: 13px;
  letter-spacing: 3px;
  color: #FFFFFF;
  text-transform: uppercase;
}

.title-block {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  margin-top: -16px;
}

.title-main {
  font-family: 'Archivo Black', sans-serif;
  font-size: 116px;
  line-height: 0.90;
  color: #FFFFFF;
  text-transform: uppercase;
  letter-spacing: -3px;
}

.title-year {
  font-family: 'Archivo Black', sans-serif;
  font-size: 116px;
  line-height: 0.90;
  color: #FF3900;
  text-transform: uppercase;
  letter-spacing: -3px;
  margin-top: 4px;
}

.period {
  font-family: 'Archivo', sans-serif;
  font-size: 12px;
  color: #555555;
  letter-spacing: 3px;
  text-transform: lowercase;
  margin-top: 28px;
}

/* PAINEL DIREITO */
.right {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #0A0A0A;
}

/* fundo geométrico */
.right::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(135deg, transparent 60%, #FF390008 100%),
    linear-gradient(45deg, #FF390005 0%, transparent 50%);
}

/* grade sutil */
.grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* marca d'água do logo */
.watermark {
  position: absolute;
  right: -80px;
  top: 50%;
  transform: translateY(-50%);
  width: 480px;
  opacity: 0.04;
}

/* texto decorativo */
.deco-text {
  position: absolute;
  bottom: 48px;
  left: 40px;
  font-family: 'Archivo Black', sans-serif;
  font-size: 11px;
  letter-spacing: 4px;
  color: #333333;
  text-transform: uppercase;
}

/* linha de acento na divisória */
.divider-line {
  position: absolute;
  left: 0; top: 15%; bottom: 15%;
  width: 2px;
  background: linear-gradient(to bottom, transparent, #FF3900 40%, #FF3900 60%, transparent);
  opacity: 0.6;
}
</style>
</head>
<body>
<div class="cover">

  <!-- ESQUERDA -->
  <div class="left">
    <div class="accent-bar"></div>

    <div class="logo-row">
      <svg class="logo-icon" viewBox="0 0 128.6 100" xmlns="http://www.w3.org/2000/svg">
        <path fill="#FFFFFF" d="M96.4,0v62.6l12.9-6.4V0h9.3c6,0,10,5,10,10.5V65c0,2.3-1.3,4.2-2.8,5.3l-48,25.6
          c-0.7,0.3-1.4,0.6-2.2,0.6c-2.4,0-4.5-1.7-4.8-4c0-0.2-0.1-0.5-0.1-0.7c0,0,0-0.5,0-0.6V79.1
          c0,0-31.8,16.9-31.9,16.9c-0.6,0.3-1.3,0.5-2,0.5c-2.4,0-4.4-1.8-4.7-4.2c0,0,0-0.4,0-0.6V10.5
          C32.1,4.7,36.8,0,42.6,0h15.2v62.5l12.9-6.4V0H96.4z M9.9,19.3C4,19.3,0,24.4,0,30.2v27.7l19.3,25.8V19.3H9.9z"/>
      </svg>
      <span class="brand-name">BetWarrior</span>
    </div>

    <div class="title-block">
      <div class="title-main">PERFO<br>RMANCE</div>
      <div class="title-year">2026</div>
      <div class="period">mai_26 &nbsp;·&nbsp; brasil</div>
    </div>
  </div>

  <!-- DIREITA -->
  <div class="right">
    <div class="grid"></div>
    <div class="divider-line"></div>

    <!-- Logo watermark -->
    <svg class="watermark" viewBox="0 0 128.6 491.3" xmlns="http://www.w3.org/2000/svg">
      <path fill="#FFFFFF" d="M53.9,344.3l25.3,6.8l-16.9,7v7.8l17.1,6.8l-25.6,7.2v8l36.3-10.5c0,0,2.7-1,2.7-4s-2.5-4-2.5-4
        L72.5,362l17.7-7.2c0,0,2.7-1,2.7-4.1s-2.8-4.2-2.8-4.2l-36.2-10.3L53.9,344.3L53.9,344.3z
        M96.4,0v62.6l12.9-6.4V0h9.3c6,0,10,5,10,10.5V65c0,2.3-1.3,4.2-2.8,5.3l-48,25.6
        c-0.7,0.3-1.4,0.6-2.2,0.6c-2.4,0-4.5-1.7-4.8-4c0-0.2-0.1-0.5-0.1-0.7c0,0,0-0.5,0-0.6V79.1
        c0,0-31.8,16.9-31.9,16.9c-0.6,0.3-1.3,0.5-2,0.5c-2.4,0-4.4-1.8-4.7-4.2c0,0,0-0.4,0-0.6V10.5
        C32.1,4.7,36.8,0,42.6,0h15.2v62.5l12.9-6.4V0H96.4z M9.9,19.3C4,19.3,0,24.4,0,30.2v27.7l19.3,25.8V19.3H9.9z"/>
    </svg>

    <div class="deco-text">Weekly Performance Report</div>
  </div>

</div>
</body>
</html>
